<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>egdata – Benchmarking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #111111;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      background: #ffffff;
      z-index: 10;
      border-bottom: 1px solid #eee;
    }

    .logo img {
      height: 48px;
      width: auto;
    }

    nav {
      display: flex;
      gap: 24px;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    main {
      padding-top: 96px;
      padding-left: 6vw;
      padding-right: 6vw;
    }

    h1 {
      font-size: 2.4rem;
      margin-bottom: 32px;
      font-weight: 600;
    }

    /* --- VISUALISATION-SPECIFIC STYLES --- */

    .viz-container {
      max-width: 900px;
      margin: 0 auto;
    }

    .btn-group {
      display: inline-flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .btn-spacer {
      display: inline-block;
      width: 30px;
    }

    button {
      padding: 6px 14px;
      border: 1px solid #ccc;
      background: #f5f5f5;
      color: #333;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #e9e9e9;
    }

    button.active {
      background: #333;
      color: white;
      border-color: #333;
      font-weight: 600;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      margin-right: 20px;
      font-size: 13px;
    }

    .legend-circle {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      background: #333;
    }

    .legend-hollow {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid #333;
      margin-right: 6px;
    }

    #chart svg {
      display: block;
      margin: 0 auto;
    }

    @media (max-width: 800px) {
      header {
        padding: 0 16px;
      }

      .logo img {
        height: 40px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">
    <a href="index.html">
      <img src="egdatared.svg" alt="egdata logo" />
    </a>
  </div>

  <nav>
    <a href="benchmarking.html">Benchmarking</a>
    <a href="insights.html">Insights</a>
    <a href="decisions.html">Decisions db</a>
  </nav>
</header>

<main>

  <h1>FOS Decisions by Product and Issue Type (Jan 2024 – Jan 2026)</h1>

  <div class="viz-container">

    <!-- FIRST ROW: layout + category -->
    <div style="margin-bottom:12px;">
      <span class="btn-group" id="layoutGroup">
        <button id="btnCombined">Combined</button>
        <button id="btnFaceted">Faceted</button>
      </span>

      <span class="btn-spacer"></span>

      <span class="btn-group" id="categoryGroup">
        <button id="btnConsumerDuty">Consumer Duty</button>
        <button id="btnDiscrimination">Discrimination</button>
        <button id="btnVulnerability">Vulnerability</button>
        <button id="btnLossOfOpportunity">Loss of opportunity</button>
        <button id="btnClosureSuspension">Closure/Suspension</button>
        <button id="btnResilianceOutage">Resiliance/Outage</button>
      </span>
    </div>

    <!-- SECOND ROW: Revolut filter -->
    <div style="margin-bottom:12px;">
      <span class="btn-group" id="revolutGroup">
        <button id="btnRevOn">Revolut Off</button>
        <button id="btnRevOff">Revolut On</button>
      </span>
    </div>

    <!-- LEGEND -->
    <div id="legend" style="margin-bottom:16px;">
      <span class="legend-item">
        <span class="legend-circle"></span>
        Upheld
      </span>

      <span class="legend-item">
        <span class="legend-hollow"></span>
        Not upheld
      </span>
    </div>

  </div>

  <!-- FIXED-WIDTH CHART -->
  <div id="chart" style="width:900px; margin:24px auto 0 auto;"></div>

</main>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
/* --------------------------------------------------
   CONFIG
-------------------------------------------------- */
const productsOriginal = [
  "Pensions and Annuities",
  "Investments",
  "Banking and Payments",
  "Consumer Credit",
  "Insurance",
  "Mortgages"
];

const productsFacetOrder = [
  "Mortgages",
  "Insurance",
  "Consumer Credit",
  "Banking and Payments",
  "Investments",
  "Pensions and Annuities"
];

const productsUpOrder = [
  "Pensions and Annuities",
  "Investments",
  "Banking and Payments",
  "Consumer Credit",
  "Insurance",
  "Mortgages"
];
const productsDownOrder = [...productsUpOrder].reverse();

const palette = [
  "#F4C542",
  "#C4473A",
  "#3AA6A1",
  "#E7A6C9",
  "#E8D8C2",
  "#8A6FA8",
  "#A7D3E8"
];

const productColour = d3.scaleOrdinal()
  .domain(productsOriginal)
  .range(palette.slice(0, productsOriginal.length));

const facetWidth = 900;
const facetHeight = 80;
const margin = { top: 10, right: 20, bottom: 10, left: 120 };
const circleR = 3;

let mode = "faceted";
let category = "cd";
let filterRevolut = true;

/* --------------------------------------------------
   HELPERS
-------------------------------------------------- */
function filterByCategory(data, category) {
  if (category === "cd")   return data.filter(d => +d["Consumer Duty"] === 1);
  if (category === "disc") return data.filter(d => +d["Discrimination"] === 1);
  if (category === "vuln") return data.filter(d => +d["Vulnerability"] === 1);
  if (category === "loss") return data.filter(d => +d["Loss of opportunity"] === 1);
  if (category === "close")return data.filter(d => +d["Closure/Suspension"] === 1);
  if (category === "res")  return data.filter(d => +d["Resiliance/Outage"] === 1);
  return data;
}

function applyRevolutFilter(data) {
  return filterRevolut
    ? data.filter(d => d["Complaints data Firm Name"] !== "Revolut Limited")
    : data;
}

function setActiveButton(groupId, buttonId) {
  const group = document.getElementById(groupId).children;
  for (const btn of group) btn.classList.remove("active");
  document.getElementById(buttonId).classList.add("active");
}

/* --------------------------------------------------
   LOAD CSV
-------------------------------------------------- */
d3.csv("fos.csv").then(rawOriginal => {

  rawOriginal.forEach((d, idx) => {
    d.Monthcat = +String(d.Monthcat).trim();

    const dec = String(d.Decision)
      .toLowerCase()
      .trim()
      .replace(/\s+/g, " ");
    d._decisionNorm = dec;
  });

  const months = Array.from(new Set(rawOriginal.map(d => d.Monthcat)))
    .filter(m => !isNaN(m))
    .sort((a, b) => a - b);

  const x = d3.scaleBand()
    .domain(months)
    .range([margin.left, facetWidth - margin.right])
    .padding(0.4);

  const totalHeight = facetHeight * productsFacetOrder.length;
  const combinedYMid = totalHeight / 2;

  const facetRowIndex = {};
  productsFacetOrder.forEach((p, i) => { facetRowIndex[p] = i; });

  const svg = d3.select("#chart")
    .append("svg")
    .attr("width", facetWidth)
    .attr("height", totalHeight);

  /* --- DATE LABELS --- */
  svg.append("text")
    .attr("x", margin.left)
    .attr("y", totalHeight - 5)
    .attr("text-anchor", "start")
    .style("font-size", "11px")
    .style("fill", "#555")
    .text("Jan 2024");

  svg.append("text")
    .attr("x", facetWidth - margin.right)
    .attr("y", totalHeight - 5)
    .attr("text-anchor", "end")
    .style("font-size", "11px")
    .style("fill", "#555")
    .text("Jan 2026");

  const gCircles = svg.append("g");

  function buildCircleData(activeData) {
    const countsMap = new Map();
    productsOriginal.forEach(p => countsMap.set(p, new Map()));

    activeData.forEach(d => {
      const product = d.Product;
      if (!countsMap.has(product)) return;
      const month = d.Monthcat;
      const decision = d._decisionNorm;
      const productMap = countsMap.get(product);
      if (!productMap.has(month)) productMap.set(month, { upheld: 0, notUpheld: 0 });
      const stats = productMap.get(month);
      if (decision === "upheld") {
        stats.upheld += 1;
      } else if (decision === "not upheld") {
        stats.notUpheld += 1;
      }
    });

    const circlesData = [];

    months.forEach(month => {
      productsFacetOrder.forEach(product => {
        const productMap = countsMap.get(product) || new Map();
        const stats = productMap.get(month) || { upheld: 0, notUpheld: 0 };

        for (let i = 0; i < stats.upheld; i++) {
          circlesData.push({
            id: `${category}|${product}|${month}|U|${i}`,
            product,
            month,
            decision: "Upheld",
            localIndex: i
          });
        }
        for (let i = 0; i < stats.notUpheld; i++) {
          circlesData.push({
            id: `${category}|${product}|${month}|N|${i}`,
            product,
            month,
            decision: "Not upheld",
            localIndex: i
          });
        }
      });
    });

    months.forEach(month => {
      let offsetUp = 0;
      productsUpOrder.forEach(product => {
        const subset = circlesData.filter(d => d.month === month && d.product === product && d.decision === "Upheld");
        subset.forEach((d, idx) => d.combinedIndex = offsetUp + idx);
        offsetUp += subset.length;
      });

      let offsetDown = 0;
      productsDownOrder.forEach(product => {
        const subset = circlesData.filter(d => d.month === month && d.product === product && d.decision === "Not upheld");
        subset.forEach((d, idx) => d.combinedIndex = offsetDown + idx);
        offsetDown += subset.length;
      });
    });

    return circlesData;
  }

  function circleX(d) {
    return x(d.month) + x.bandwidth() / 2;
  }

  function facetY(d) {
    const row = facetRowIndex[d.product];
    const yMid = row * facetHeight + facetHeight / 2;
    return d.decision === "Upheld"
      ? yMid - circleR - d.localIndex * (circleR * 2)
      : yMid + circleR + d.localIndex * (circleR * 2);
  }

  function combinedY(d) {
    return d.decision === "Upheld"
      ? combinedYMid - circleR - d.combinedIndex * (circleR * 2)
      : combinedYMid + circleR + d.combinedIndex * (circleR * 2);
  }

  function drawFacetedOverlays() {
    svg.selectAll(".overlay").remove();
    productsFacetOrder.forEach((product, i) => {
      const yMid = i * facetHeight + facetHeight / 2;

      svg.append("line")
        .attr("class", "overlay")
        .attr("x1", margin.left)
        .attr("x2", facetWidth - margin.right)
        .attr("y1", yMid)
        .attr("y2", yMid)
        .attr("stroke", "#999");

      svg.append("text")
        .attr("class", "overlay")
        .attr("x", margin.left - 8)
        .attr("y", yMid + 4)
        .attr("text-anchor", "end")
        .style("font-size", "11px")
        .style("font-weight", "600")
        .style("fill", productColour(product))
        .text(product);
    });
  }

  function drawCombinedOverlays() {
    svg.selectAll(".overlay").remove();

    svg.append("line")
      .attr("class", "overlay")
      .attr("x1", margin.left)
      .attr("x2", facetWidth - margin.right)
      .attr("y1", combinedYMid)
      .attr("y2", combinedYMid)
      .attr("stroke", "#999");

    svg.append("text")
      .attr("class", "overlay")
      .attr("x", margin.left)
      .attr("y", combinedYMid - 30)
      .style("font-size", "12px")
      .style("font-weight", "600")
      .text("All products combined (colour shows product)");
  }

  function rebuild() {
    let rawFiltered = applyRevolutFilter(rawOriginal);
    let activeData = filterByCategory(rawFiltered, category);
    return buildCircleData(activeData);
  }

  let circlesData = rebuild();

  let circles = gCircles.selectAll("circle")
    .data(circlesData, d => d.id)
    .join("circle")
    .attr("cx", d => circleX(d))
    .attr("cy", d => facetY(d))
    .attr("r", circleR)
    .attr("fill", d => d.decision === "Upheld" ? productColour(d.product) : "none")
    .attr("stroke", d => d.decision === "Not upheld" ? productColour(d.product) : "none")
    .attr("stroke-width", d => d.decision === "Not upheld" ? 1.2 : 0.0)
    .attr("opacity", 0.9);

  drawFacetedOverlays();
  setActiveButton("layoutGroup", "btnFaceted");
  setActiveButton("categoryGroup", "btnConsumerDuty");
  setActiveButton("revolutGroup", "btnRevOn");

  function setMode(newMode) {
    mode = newMode;
    const t = svg.transition().duration(2000).ease(d3.easeCubicInOut);

    circles.transition(t)
      .attr("cx", d => circleX(d))
      .attr("cy", d => mode === "faceted" ? facetY(d) : combinedY(d));

    svg.selectAll(".overlay").remove();

    t.on("end", () => {
      if (mode === "faceted") drawFacetedOverlays();
      else drawCombinedOverlays();
    });
  }

  function updateCircles() {
    circlesData = rebuild();

    const t = svg.transition().duration(2000).ease(d3.easeCubicInOut);

    const update = gCircles.selectAll("circle")
      .data(circlesData, d => d.id);

    update.exit()
      .transition(t)
      .attr("opacity", 0)
      .remove();

    const enter = update.enter()
      .append("circle")
      .attr("cx", d => circleX(d))
      .attr("cy", d => mode === "faceted" ? facetY(d) : combinedY(d))
      .attr("r", circleR)
      .attr("fill", d => d.decision === "Upheld" ? productColour(d.product) : "none")
      .attr("stroke", d => d.decision === "Not upheld" ? productColour(d.product) : "none")
      .attr("stroke-width", d => d.decision === "Not upheld" ? 1.2 : 0.0)
      .attr("opacity", 0);

    circles = enter.merge(update);

    circles.transition(t)
      .attr("cx", d => circleX(d))
      .attr("cy", d => mode === "faceted" ? facetY(d) : combinedY(d))
      .attr("opacity", 0.9);

        }

  // Layout buttons
  document.getElementById("btnCombined").onclick = () => {
    setMode("combined");
    setActiveButton("layoutGroup", "btnCombined");
  };

  document.getElementById("btnFaceted").onclick = () => {
    setMode("faceted");
    setActiveButton("layoutGroup", "btnFaceted");
  };

  // Category buttons
  document.getElementById("btnConsumerDuty").onclick = () => {
    category = "cd";
    setActiveButton("categoryGroup", "btnConsumerDuty");
    updateCircles();
  };

  document.getElementById("btnDiscrimination").onclick = () => {
    category = "disc";
    setActiveButton("categoryGroup", "btnDiscrimination");
    updateCircles();
  };

  document.getElementById("btnVulnerability").onclick = () => {
    category = "vuln";
    setActiveButton("categoryGroup", "btnVulnerability");
    updateCircles();
  };

  document.getElementById("btnLossOfOpportunity").onclick = () => {
    category = "loss";
    setActiveButton("categoryGroup", "btnLossOfOpportunity");
    updateCircles();
  };

  document.getElementById("btnClosureSuspension").onclick = () => {
    category = "close";
    setActiveButton("categoryGroup", "btnClosureSuspension");
    updateCircles();
  };

  document.getElementById("btnResilianceOutage").onclick = () => {
    category = "res";
    setActiveButton("categoryGroup", "btnResilianceOutage");
    updateCircles();
  };

  // Revolut buttons
  document.getElementById("btnRevOn").onclick = () => {
    filterRevolut = true;
    setActiveButton("revolutGroup", "btnRevOn");
    updateCircles();
  };

  document.getElementById("btnRevOff").onclick = () => {
    filterRevolut = false;
    setActiveButton("revolutGroup", "btnRevOff");
    updateCircles();
  };
});
</script>
</body>
</html>
